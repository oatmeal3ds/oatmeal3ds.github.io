<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cave Scrolls</title>
  
  <script src="https://www.google.com/recaptcha/api.js?render=6LejqXQsAAAAAHq5CWNpprbsNuxzGRVNfW6z0TwU"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:wght@100&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/assets/elevatedmountains.css">
</head>
<body>

  <div id="menu-overlay"></div>
  <div id="site-header"></div>

  <div class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div style="z-index: 1;">
      <h1 class="hero-title">Cave Scrolls</h1>
      <p class="hero-sub">All news and updates</p>
    </div>
  </div>

  <div style="padding-top: 10px;">
      <div class="card">
                    <div style="display:flex;gap:8px;">
  <input type="text" id="news-search" placeholder="Search scrolls..." style="flex-grow:1;">
  <select id="search-filter">
    <option value="all">All</option>
    <option value="title">Title</option>
    <option value="desc">Description</option>
  </select>
</div>
      </div>
    <details class="card" open>
      <summary>All Scrolls</summary>
      <div class="card-content">
          <div id="news-feed">
             <p style="color: #777;">Unrolling the scrolls...</p> 
          </div>
      </div>
    </details>
  </div>

  <footer id="site-footer"></footer>

  <script>
    function loadOatLayout() {
      const script = document.createElement('script');
      script.src = `/assets/layout.js?t=${Date.now()}`;
      document.body.appendChild(script);
    }
    loadOatLayout();

    grecaptcha.ready(function() {
      grecaptcha.execute('6LejqXQsAAAAAHq5CWNpprbsNuxzGRVNfW6z0TwU', {action: 'homepage'});
    });

    // All news — no slice
    function oatSS_Callback(scrolls) {
      const feedContainer = document.getElementById('news-feed');
      if (scrolls && scrolls.length > 0) {
        feedContainer.innerHTML = '';
        scrolls.forEach(item => {
          feedContainer.innerHTML += `
            <div class="news-item">
              <span class="news-date">${item.date}</span>
              <a href="${item.url}" target="_blank" class="news-link">
                ${item.title} <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.7rem;margin-left:5px;"></i>
              </a>
              <p class="news-desc">${item.desc}</p>
            </div>`;
        });
      } else {
        feedContainer.innerHTML = '<p style="color:#777;">No scrolls yet.</p>';
      }
    }

    function loadOatSS() {
      const script = document.createElement('script');
      script.src = `/news.js?t=${Date.now()}`;
      document.body.appendChild(script);
    }
    loadOatSS();
function highlight(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<mark style="background:#fdd835;color:#111;border-radius:2px;">$1</mark>');
}

function doSearch() {
  const query = document.getElementById('news-search').value.toLowerCase();
  const filter = document.getElementById('search-filter').value;

  document.querySelectorAll('.news-item').forEach(item => {
    const title = item.querySelector('.news-link').textContent.toLowerCase();
    const desc = item.querySelector('.news-desc').textContent.toLowerCase();

    let match = false;
    if (filter === 'all') match = title.includes(query) || desc.includes(query);
    if (filter === 'title') match = title.includes(query);
    if (filter === 'desc') match = desc.includes(query);

    item.style.display = (!query || match) ? '' : 'none';
  });
}

document.getElementById('news-search').addEventListener('input', doSearch);
document.getElementById('search-filter').addEventListener('change', doSearch);
  </script>
</body>
</html>
