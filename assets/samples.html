<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oatmeal's Cave</title>
  
  <script src="https://www.google.com/recaptcha/api.js?render=6LejqXQsAAAAAHq5CWNpprbsNuxzGRVNfW6z0TwU"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:wght@100&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://oatmeal3ds.github.io/assets/elevatedmountains.css">

  <style>
    /* Page-specific styles go here */
  </style>
</head>
<body>

  <div id="menu-overlay"></div>
  <div id="site-header"></div>

  <div class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div style="z-index: 1;">
      <h1 class="hero-title">Template</h1>
      <p class="hero-sub">Template for making new pages</p>
    </div>
  </div>

  <div style="padding-top: 10px;">

    <h1 class="hero-sub">Cards</h1>
    <details class="card">
      <summary>Dropdown Card</summary>
      <div class="card-content">
        <p>This is a dropdown</p>
      </div>
    </details>
    <div class="card">
      <p>Normal Card</p>
    </div>

    <h1 class="hero-sub">Input</h1>
    <details class="card">
      <summary>Text Inputs</summary>
      <div class="card-content">
        <p class="hero-sub">Single-Line</p>
        <input type="text" placeholder="Text">
        <input type="number" placeholder="Number">
        <input type="password" placeholder="Password">
        <input type="email" placeholder="Email">
        <input type="url" placeholder="URL">
        <input type="date">
        <input type="color">
        <p class="hero-sub">Multi-Line</p>
        <textarea placeholder="Big text box"></textarea>
      </div>
    </details>
    <details class="card">
      <summary>Inputs</summary>
      <div class="card-content">
        <select>
          <option>Option 1</option>
          <option>Option 2</option>
        </select>
      </div>
      <div class="card-content">
        <div>
          <input type="checkbox"> Check me
        </div>
        <div>
          <input type="radio" name="group"> Option A
          <input type="radio" name="group"> Option B
        </div>
      </div>
      <div class="card-content">
        <input type="range" min="0" max="100">
      </div>
      <div class="card-content">
        <input type="file">
      </div>
    </details>

  </div>

  <footer id="site-footer"></footer>

  <script>
    function loadOatLayout() {
      const script = document.createElement('script');
      script.src = `https://oatmeal3ds.github.io/assets/layout.js?t=${Date.now()}`;
      document.body.appendChild(script);
    }
    loadOatLayout();

    grecaptcha.ready(function() {
      grecaptcha.execute('6LejqXQsAAAAAHq5CWNpprbsNuxzGRVNfW6z0TwU', {action: 'homepage'});
    });
  </script>
</body>
</html>
