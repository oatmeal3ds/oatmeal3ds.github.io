    .drag-handle {

.item-header {

input[type="text"], input[type="url"], textarea {

#output-box {

  <script>
    function loadOatLayout() {
      const script = document.createElement('script');
      script.src = `/assets/layout.js?t=${Date.now()}`;
      document.body.appendChild(script);
    }
    loadOatLayout();

    grecaptcha.ready(function() {
      grecaptcha.execute('6LejqXQsAAAAAHq5CWNpprbsNuxzGRVNfW6z0TwU', {action: 'homepage'});
    });
        // --- NEWS DISPLAY (live feed preview) ---
function oatSS_Callback(scrolls) {
  allScrolls = [...scrolls].reverse();
  renderPage(1);
}

function renderPage(page) {
  currentPage = page;
  const feedContainer = document.getElementById('news-feed');
  const totalPages = Math.ceil(allScrolls.length / PAGE_SIZE);
  const start = (page - 1) * PAGE_SIZE;
  const pageItems = allScrolls.slice(start, start + PAGE_SIZE);

  feedContainer.innerHTML = '';

  if (pageItems.length === 0) {
    feedContainer.innerHTML = '<p style="color:#777;">No scrolls yet.</p>';
    return;
  }

  pageItems.forEach(item => {
    feedContainer.innerHTML += `
      <div class="news-item">
        <span class="news-date">${item.date}</span>
        <a href="${item.url}" target="_blank" class="news-link">
          ${item.title} <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.7rem;margin-left:5px;"></i>
        </a>
        <p class="news-desc">${item.desc}</p>
      </div>`;
  });

  let pagination = '<div style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap;">';
  pagination += `<button onclick="renderPage(${page - 1})" ${page === 1 ? 'disabled style="opacity:0.4"' : ''}>&#8249;</button>`;
  for (let i = 1; i <= totalPages; i++) {
    pagination += `<button onclick="renderPage(${i})" style="${i === page ? 'background:#fdd835;color:#111;' : ''}">${i}</button>`;
  }
  pagination += `<button onclick="renderPage(${page + 1})" ${page === totalPages ? 'disabled style="opacity:0.4"' : ''}>&#8250;</button>`;
  pagination += '</div>';
  feedContainer.innerHTML += pagination;
}

function loadOatSS() {
  const script = document.createElement('script');
  script.src = `/news.js?t=${Date.now()}`;
  document.body.appendChild(script);
}

let allScrolls = [];
let currentPage = 1;
const PAGE_SIZE = 2;

loadOatSS();
        // --- NEWS EDITOR ---
    const NEWS_URL = '/news.js';
    let items = [];
    let dragSrcIndex = null;

    function fetchNews() {
      document.getElementById('status').textContent = 'Fetching...';
      const prev = window.oatSS_Callback;
      window.oatSS_Callback = function(data) {
        items = JSON.parse(JSON.stringify(data));
        renderItems();
        document.getElementById('status').textContent = `Loaded ${items.length} item(s).`;
        window.oatSS_Callback = prev;
        loadOatSS();
      };
      const old = document.getElementById('news-script');
      if (old) old.remove();
      const script = document.createElement('script');
      script.id = 'news-script';
      script.src = `${NEWS_URL}?t=${Date.now()}`;
      document.body.appendChild(script);
    }

    // Convert "Feb 27, 2026" → "2026-02-27" for date input
    function toInputDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return '';
      return d.toISOString().split('T')[0];
    }

    // Convert "2026-02-27" → "Feb 27, 2026" for output
    function toDisplayDate(str) {
      if (!str) return '';
      const d = new Date(str + 'T00:00:00');
      if (isNaN(d)) return str;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderItems() {
      const container = document.getElementById('items-container');
      container.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'news-item-editor';
        div.draggable = true;
        div.dataset.index = i;
        div.innerHTML = `
          <div class="item-header">
            <span class="drag-handle" title="Drag to reorder">⠿</span>
            <b>Item ${i + 1}</b>
            <button onclick="removeItem(${i})">Remove</button>
          </div>
          Title: <input type="text" id="title-${i}" value="${esc(item.title || '')}"><br>
          Date: <input type="date" id="date-${i}" value="${toInputDate(item.date)}"><br>
          Desc: <textarea id="desc-${i}">${esc(item.desc || '')}</textarea>
          URL: <input type="url" id="url-${i}" value="${esc(item.url || '')}">`;

        div.addEventListener('dragstart', () => {
          dragSrcIndex = i;
          setTimeout(() => div.classList.add('dragging'), 0);
        });
        div.addEventListener('dragend', () => {
          div.classList.remove('dragging');
          document.querySelectorAll('.news-item-editor').forEach(el => el.classList.remove('drag-over'));
        });
        div.addEventListener('dragover', e => {
          e.preventDefault();
          document.querySelectorAll('.news-item-editor').forEach(el => el.classList.remove('drag-over'));
          div.classList.add('drag-over');
        });
        div.addEventListener('drop', e => {
          e.preventDefault();
          if (dragSrcIndex === null || dragSrcIndex === i) return;
          collectItems();
          const moved = items.splice(dragSrcIndex, 1)[0];
          items.splice(i, 0, moved);
          renderItems();
          dragSrcIndex = null;
        });

        container.appendChild(div);
      });
    }

function addItem() {
  const today = new Date().toISOString().split('T')[0];
  items.unshift({ title: '', date: today, desc: '', url: '' });
  renderItems();
  const cards = document.querySelectorAll('.news-item-editor');
  if (cards.length) cards[0].scrollIntoView({ behavior: 'smooth' });
}

    function removeItem(i) {
      collectItems();
      items.splice(i, 1);
      renderItems();
    }

    function collectItems() {
      items = items.map((_, i) => ({
        title: document.getElementById(`title-${i}`)?.value || '',
        date:  toDisplayDate(document.getElementById(`date-${i}`)?.value || ''),
        desc:  document.getElementById(`desc-${i}`)?.value || '',
        url:   document.getElementById(`url-${i}`)?.value || '',
      }));
    }

    function generateOutput() {
      collectItems();
      const output =
`// This is a "wrapper" function that sends the data to your page
oatSS_Callback(${JSON.stringify(items, null, 2)});`;
      document.getElementById('output-box').value = output;
      document.getElementById('output-section').style.display = 'block';
      document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });
    }

    function copyOutput() {
      const box = document.getElementById('output-box');
      box.select();
      document.execCommand('copy');
      document.getElementById('status').textContent = 'Copied!';
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
