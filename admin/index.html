<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  
  <script src="https://www.google.com/recaptcha/api.js?render=6LejqXQsAAAAAHq5CWNpprbsNuxzGRVNfW6z0TwU"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:wght@100&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/assets/elevatedmountains.css">

  <style>
    .drag-handle {
      cursor: grab;
      color: #555;
      padding: 0 8px;
      font-size: 1.2rem;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .item-header {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }
    .item-header b { flex-grow: 1; }
    .news-item-editor {
      background: #1c1c1c;
      border: 1px solid #333;
      border-left: 3px solid #2e4d22;
      padding: 12px;
      margin-bottom: 10px;
      transition: opacity 0.2s;
    }
    .news-item-editor.dragging { opacity: 0.4; }
    .news-item-editor.drag-over { border-top: 3px solid #fdd835; }
    input[type="date"] {
      background: #1c1c1c;
      border: 1px solid #333;
      color: #eee;
      padding: 6px 10px;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      color-scheme: dark;
    }
    input[type="date"]:hover { border-color: #4a7a36; }
    input[type="date"]:focus { border-color: #2e4d22; }
    input[type="text"], input[type="url"], textarea {
      width: 100%;
      margin-bottom: 6px;
    }
    #output-box {
      background: #0d0d0d;
      border: 1px solid #333;
      color: #fdd835;
      font-family: monospace;
      font-size: 12px;
      padding: 12px;
      width: 100%;
    }
    .field-label {
      color: #777;
      font-size: 0.8rem;
      margin-bottom: 2px;
      display: block;
    }
  </style>
</head>
<body>

  <div id="menu-overlay"></div>
  <div id="site-header"></div>

  <div class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div style="z-index: 1;">
      <h1 class="hero-title">Admin</h1>
      <p class="hero-sub">Control anything</p>
    </div>
  </div>

  <div style="padding-top: 10px;">

    <details class="card" open>
      <summary>Edit Cave News</summary>
      <div class="card-content">

        <p class="hero-sub" style="margin:10px 0;text-align:left;">Preview</p>
        <div id="news-preview" data-oatss="all" data-mode="complex" data-paginate="3">
          <p style="color:#777;">Unrolling the scrolls...</p>
        </div>

        <p class="hero-sub" style="margin:10px 0;text-align:left;">News Maker</p>
        <button onclick="fetchNews()">Get News</button>
        <button onclick="addItem()">Add Item</button>
        <button onclick="generateOutput()">Get News Text</button>
        <p id="status" style="font-size:0.85rem;color:#777;margin:6px 0;"></p>

        <div id="items-container"></div>

        <div id="output-section" style="display:none;">
          <h3>Copy this into news.js:</h3>
          <textarea id="output-box" rows="20" readonly></textarea><br>
          <button onclick="copyOutput()">Copy</button>
        </div>

      </div>
    </details>

    <div class="card" style="text-align:center;">
      <a href="https://www.google.com/recaptcha/admin/site/745843107" target="_blank"><button style="width:95%;margin:8px;">Open reCAPTCHA Dashboard</button></a>
      <a href="/" target="_blank"><button style="width:95%;margin:8px;">Open Site</button></a>
      <a href="https://github.com/oatmeal3ds/oatmeal3ds.github.io/tree/main" target="_blank"><button style="width:95%;margin:8px;">Open GitHub Repo</button></a>
    </div>

    <details class="card">
      <summary>Download Templates</summary>
      <div class="card-content">
        <a href="https://raw.githubusercontent.com/oatmeal3ds/oatmeal3ds.github.io/refs/heads/main/assets/template.html"><button style="width:95%;margin:4px;">Download Template</button></a>
        <a href="https://raw.githubusercontent.com/oatmeal3ds/oatmeal3ds.github.io/refs/heads/main/assets/samples.html"><button style="width:95%;margin:4px;">Download Card Samples</button></a>
      </div>
    </details>

    <details class="card">
      <summary>About</summary>
      <div class="card-content">
        <p>This page is only for the administrator Oatmeal3ds. If you somehow got a copy of this page, please delete it immediately.</p>
        <p>~Oatmeal</p>
      </div>
    </details>

  </div>

  <footer id="site-footer"></footer>

  <script>
    function loadOatLayout() {
      const script = document.createElement('script');
      script.src = `/assets/layout.js?t=${Date.now()}`;
      document.body.appendChild(script);
    }
    loadOatLayout();

    grecaptcha.ready(function() {
      grecaptcha.execute('6LejqXQsAAAAAHq5CWNpprbsNuxzGRVNfW6z0TwU', {action: 'homepage'});
    });

    // --- NEWS EDITOR ---
    const NEWS_URL = '/news.js';
    let items = [];
    let dragSrcIndex = null;

    function fetchNews() {
      document.getElementById('status').textContent = 'Fetching...';
      const prev = window.oatSS_Callback;
      window.oatSS_Callback = function(data) {
        items = JSON.parse(JSON.stringify(data));
        renderItems();
        document.getElementById('status').textContent = `Loaded ${items.length} item(s).`;
        window.oatSS_Callback = prev;
      };
      const old = document.getElementById('news-script');
      if (old) old.remove();
      const script = document.createElement('script');
      script.id = 'news-script';
      script.src = `${NEWS_URL}?t=${Date.now()}`;
      document.body.appendChild(script);
    }

    function toInputDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return '';
      return d.toISOString().split('T')[0];
    }

    function renderItems() {
      const container = document.getElementById('items-container');
      container.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'news-item-editor';
        div.draggable = true;
        div.dataset.index = i;

        // support both old and new format
        const title = item.t || item.title || '';
        const date  = item.dt || item.date || '';
        const desc  = item.d || item.desc || '';
        const url   = item.u || item.url || '';
        const cats  = Array.isArray(item.c) ? item.c.join(', ') : (item.c || '');
        const id    = item.id || '';
        const full  = item.f || '';

        div.innerHTML = `
          <div class="item-header">
            <span class="drag-handle" title="Drag to reorder">⠿</span>
            <b>Item ${i + 1}</b>
            <button onclick="removeItem(${i})">Remove</button>
          </div>
          <span class="field-label">ID</span>
          <input type="text" id="id-${i}" value="${esc(id)}" placeholder="unique-id"><br>
          <span class="field-label">Title</span>
          <input type="text" id="title-${i}" value="${esc(title)}"><br>
          <span class="field-label">Date</span>
          <input type="date" id="date-${i}" value="${toInputDate(date)}"><br>
          <span class="field-label">Description (short)</span>
          <textarea id="desc-${i}">${esc(desc)}</textarea>
          <span class="field-label">URL</span>
          <input type="url" id="url-${i}" value="${esc(url)}"><br>
          <span class="field-label">Categories (comma separated, e.g. site, feature, announcement)</span>
          <input type="text" id="cats-${i}" value="${esc(cats)}" placeholder="site, feature"><br>
          <span class="field-label">Full Content (markdown, optional)</span>
          <textarea id="full-${i}" rows="4" placeholder="# Title\n\nFull article in markdown...">${esc(full)}</textarea>`;

        div.addEventListener('dragstart', () => {
          dragSrcIndex = i;
          setTimeout(() => div.classList.add('dragging'), 0);
        });
        div.addEventListener('dragend', () => {
          div.classList.remove('dragging');
          document.querySelectorAll('.news-item-editor').forEach(el => el.classList.remove('drag-over'));
        });
        div.addEventListener('dragover', e => {
          e.preventDefault();
          document.querySelectorAll('.news-item-editor').forEach(el => el.classList.remove('drag-over'));
          div.classList.add('drag-over');
        });
        div.addEventListener('drop', e => {
          e.preventDefault();
          if (dragSrcIndex === null || dragSrcIndex === i) return;
          collectItems();
          const moved = items.splice(dragSrcIndex, 1)[0];
          items.splice(i, 0, moved);
          renderItems();
          dragSrcIndex = null;
        });

        container.appendChild(div);
      });
    }

    function addItem() {
      const today = new Date().toISOString().split('T')[0];
      items.unshift({ id: '', t: '', dt: today, d: '', u: '', c: [], f: '' });
      renderItems();
      const cards = document.querySelectorAll('.news-item-editor');
      if (cards.length) cards[0].scrollIntoView({ behavior: 'smooth' });
    }

    function removeItem(i) {
      collectItems();
      items.splice(i, 1);
      renderItems();
    }

    function collectItems() {
      items = items.map((_, i) => {
        const catsRaw = document.getElementById(`cats-${i}`)?.value || '';
        const cats = catsRaw.split(',').map(s => s.trim()).filter(Boolean);
        const full = document.getElementById(`full-${i}`)?.value || '';
        return {
          id:  document.getElementById(`id-${i}`)?.value || '',
          t:   document.getElementById(`title-${i}`)?.value || '',
          dt:  document.getElementById(`date-${i}`)?.value || '',
          d:   document.getElementById(`desc-${i}`)?.value || '',
          u:   document.getElementById(`url-${i}`)?.value || '',
          c:   cats,
          ...(full ? { f: full } : {})
        };
      });
    }

    function generateOutput() {
      collectItems();
      const output = `// This is a "wrapper" function that sends the data to your page\noatSS_Callback(${JSON.stringify(items, null, 2)});`;
      document.getElementById('output-box').value = output;
      document.getElementById('output-section').style.display = 'block';
      document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });
    }

    function copyOutput() {
      const box = document.getElementById('output-box');
      box.select();
      document.execCommand('copy');
      document.getElementById('status').textContent = 'Copied!';
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
